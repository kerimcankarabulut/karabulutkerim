<div style="max-width: 400px; margin: 50px auto; font-family: Arial, sans-serif;">
  <h2>Kayıt Ol</h2>
  
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Kullanıcı Adı:</label>
      <input type="text" formControlName="username" style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">E-posta:</label>
      <input type="email" formControlName="email" style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Şifre:</label>
      <input type="password" formControlName="password" style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px;">Yaş:</label>
      <input type="number" formControlName="yas" style="width: 100%; padding: 8px;">
    </div>

    <div style="margin-bottom: 20px;">
      <label style="display: block; margin-bottom: 5px;">Cinsiyet:</label>
      <label style="margin-right: 15px;">
        <input type="radio" value="Erkek" formControlName="cinsiyet"> Erkek
      </label>
      <label>
        <input type="radio" value="Kadin" formControlName="cinsiyet"> Kadın
      </label>
    </div>

    <button type="submit" [disabled]="registerForm.invalid" style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer;">
      Kayıt Ol
    </button>
    
  </form>
</div>

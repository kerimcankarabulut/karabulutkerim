<div *ngIf="!veriHazir" class="detail-container" style="min-height: 100vh;"></div>

<div class="detail-container" *ngIf="veriHazir">
  
  <a routerLink="/home" class="back-link-btn">
    <div class="back-icon">&larr;</div>
    <span class="tooltip-text-right">Vitrine Dön</span>
  </a>

  <div class="blog-detail-card" *ngIf="blog">
    <div class="detail-header">
      <h1>{{ blog.title }}</h1>
      <p class="meta-info">Kategori: {{ blog.category ? blog.category : 'Genel' }} | Tarih: {{ blog.created_at ? (blog.created_at | date:'dd MMM yyyy') : '31 May 2026' }}</p>
    </div>
    
    <div class="detail-body">
      <p class="full-content">{{ blog.text_content }}</p>
    </div>
  </div>

  <div class="error-card" *ngIf="!blog">
    <h2>Bu yazıya ulaşılamadı.</h2>
    <a routerLink="/home" class="social-btn">Vitrine Geri Dön</a>
  </div>

</div>
